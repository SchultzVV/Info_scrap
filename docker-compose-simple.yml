version: '3.8'

services:
  ocr-api:
    build:
      context: .
      dockerfile: Dockerfile.simple
    image: simple-ocr-api:latest
    container_name: simple-ocr-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
